<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SDL Logo Preview 2</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; }
  .row { display: flex; align-items: center; gap: 28px; padding: 16px 24px; }
  .light { background: #ffffff; color: #101826; }
  .dark { background: #0B1220; color: #F8FAFC; }
  .cell { text-align: center; }
  .cell p { font-size: 11px; margin: 4px 0 0; opacity: 0.6; }
  .sizes { display: flex; gap: 10px; align-items: flex-end; }
</style>
</head>
<body>
  <div class="row light">
    <div class="cell"><img src="sdl-mark.svg" width="120"><p>A: 4 rows</p></div>
    <div class="cell">
      <svg viewBox="0 0 256 256" width="120" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke="#101826" stroke-width="22" stroke-linecap="round">
          <line x1="100" y1="108" x2="156" y2="108"/>
          <line x1="72" y1="156" x2="184" y2="156"/>
          <line x1="44" y1="204" x2="212" y2="204"/>
        </g>
        <circle cx="128" cy="60" r="13" fill="#0D9488"/>
      </svg>
      <p>A&prime;: 3 rows chunky</p>
    </div>
    <div class="sizes">
      <img src="sdl-mark.svg" width="32"><img src="sdl-mark.svg" width="16">
      <svg viewBox="0 0 256 256" width="32" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke="#101826" stroke-width="22" stroke-linecap="round">
          <line x1="100" y1="108" x2="156" y2="108"/>
          <line x1="72" y1="156" x2="184" y2="156"/>
          <line x1="44" y1="204" x2="212" y2="204"/>
        </g>
        <circle cx="128" cy="60" r="13" fill="#0D9488"/>
      </svg>
      <svg viewBox="0 0 256 256" width="16" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke="#101826" stroke-width="22" stroke-linecap="round">
          <line x1="100" y1="108" x2="156" y2="108"/>
          <line x1="72" y1="156" x2="184" y2="156"/>
          <line x1="44" y1="204" x2="212" y2="204"/>
        </g>
        <circle cx="128" cy="60" r="13" fill="#0D9488"/>
      </svg>
    </div>
    <div class="cell"><img src="sdl-icon.svg" width="72"><p>icon</p></div>
  </div>
  <div class="row dark">
    <div class="cell"><img src="sdl-mark-dark.svg" width="120"><p>A dark</p></div>
    <div class="cell">
      <svg viewBox="0 0 256 256" width="120" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke="#F8FAFC" stroke-width="22" stroke-linecap="round">
          <line x1="100" y1="108" x2="156" y2="108"/>
          <line x1="72" y1="156" x2="184" y2="156"/>
          <line x1="44" y1="204" x2="212" y2="204"/>
        </g>
        <circle cx="128" cy="60" r="13" fill="#2DD4BF"/>
      </svg>
      <p>A&prime; dark</p>
    </div>
    <div class="cell"><img src="sdl-lockup-dark.svg" width="300"><p>lockup dark</p></div>
  </div>
  <div class="row light">
    <div class="cell"><img src="sdl-lockup.svg" width="300"><p>lockup light</p></div>
  </div>
</body>
</html>
