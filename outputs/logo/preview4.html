<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SDL Logo v3 Preview</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; }
  .row { display: flex; align-items: center; gap: 24px; padding: 12px 20px; flex-wrap: wrap; }
  .light { background: #ffffff; color: #101826; }
  .dark { background: #0B1220; color: #F8FAFC; }
  .cell { text-align: center; }
  .cell p { font-size: 11px; margin: 2px 0 0; opacity: 0.6; }
  .sizes { display: flex; gap: 10px; align-items: flex-end; }
</style>
</head>
<body>
  <div class="row light">
    <div class="cell"><img src="sdl-mark-v3.svg" width="180"><p>v3 flat</p></div>
    <div class="cell"><img src="sdl-mark-v3-gradient.svg" width="180"><p>v3 gradient (sketch-faithful)</p></div>
    <div class="sizes">
      <img src="sdl-mark-v3.svg" width="64"><img src="sdl-mark-v3.svg" width="48"><img src="sdl-mark-v3.svg" width="32">
    </div>
  </div>
  <div class="row dark">
    <div class="cell"><img src="sdl-mark-v3-dark.svg" width="180"><p>v3 dark</p></div>
    <div class="sizes">
      <img src="sdl-mark-v3-dark.svg" width="64"><img src="sdl-mark-v3-dark.svg" width="48"><img src="sdl-mark-v3-dark.svg" width="32">
    </div>
  </div>
</body>
</html>
