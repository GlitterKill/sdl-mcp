<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>SDL Logo v2 Preview</title>
<style>
  body { margin: 0; font-family: system-ui, sans-serif; }
  .row { display: flex; align-items: center; gap: 24px; padding: 12px 20px; flex-wrap: wrap; }
  .light { background: #ffffff; color: #101826; }
  .dark { background: #0B1220; color: #F8FAFC; }
  .cell { text-align: center; }
  .cell p { font-size: 11px; margin: 2px 0 0; opacity: 0.6; }
  .sizes { display: flex; gap: 10px; align-items: flex-end; }
</style>
</head>
<body>
  <div class="row light">
    <div class="cell"><img src="sdl-mark-v2.svg" width="130"><p>v2 no iris</p></div>
    <div class="cell"><img src="sdl-mark-v2-iris.svg" width="130"><p>v2 iris (blades)</p></div>
    <div class="cell">
      <svg viewBox="0 0 512 512" width="130" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="n1"><path clip-rule="evenodd" d="M256,64 L76,448 L436,448 Z M256,202 L155.6,376 L356.4,376 Z"/></clipPath>
        </defs>
        <g clip-path="url(#n1)">
          <g transform="rotate(-6 256 300)" fill="#101826">
            <rect x="-60" y="52" width="632" height="52"/><rect x="-60" y="126" width="632" height="52"/>
            <rect x="-60" y="200" width="632" height="52"/><rect x="-60" y="274" width="632" height="52"/>
            <rect x="-60" y="348" width="632" height="52"/><rect x="-60" y="422" width="632" height="52"/>
          </g>
        </g>
        <g fill="none" stroke="#101826" stroke-width="8" stroke-linejoin="round">
          <path d="M256,232 L181.5,361 L330.5,361 Z"/>
          <path d="M256,256 L202.3,349 L309.7,349 Z" transform="rotate(12 256 318)"/>
          <path d="M256,276 L219.6,339 L292.4,339 Z" transform="rotate(24 256 318)"/>
          <path d="M256,292 L233.5,331 L278.5,331 Z" transform="rotate(36 256 318)"/>
        </g>
      </svg>
      <p>alt iris: nested ladder (4 rungs)</p>
    </div>
    <div class="cell">
      <svg viewBox="0 0 512 512" width="130" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="n2"><path d="M256,64 L76,448 L436,448 Z"/></clipPath>
        </defs>
        <g clip-path="url(#n2)">
          <g transform="rotate(-6 256 300)">
            <rect x="-60" y="52" width="632" height="52" fill="#0D9488"/>
            <g fill="#101826">
              <rect x="-60" y="126" width="632" height="52"/><rect x="-60" y="200" width="632" height="52"/>
              <rect x="-60" y="274" width="632" height="52"/><rect x="-60" y="348" width="632" height="52"/>
              <rect x="-60" y="422" width="632" height="52"/>
            </g>
          </g>
        </g>
      </svg>
      <p>accent: teal apex slice</p>
    </div>
    <div class="cell">
      <svg viewBox="0 0 512 512" width="130" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="n3"><path clip-rule="evenodd" d="M256,64 L76,448 L436,448 Z M256,202 L155.6,376 L356.4,376 Z"/></clipPath>
        </defs>
        <g clip-path="url(#n3)">
          <g transform="rotate(-6 256 300)" fill="#101826">
            <rect x="-60" y="52" width="632" height="52"/><rect x="-60" y="126" width="632" height="52"/>
            <rect x="-60" y="200" width="632" height="52"/><rect x="-60" y="274" width="632" height="52"/>
            <rect x="-60" y="348" width="632" height="52"/><rect x="-60" y="422" width="632" height="52"/>
          </g>
        </g>
        <g stroke-linejoin="round">
          <path fill="none" stroke="#0D9488" stroke-width="9" d="M256,226 L178.1,361 L333.9,361 Z"/>
          <path fill="none" stroke="#0D9488" stroke-width="8" d="M243.4,265.5 L306,330.3 L218.6,352.1 Z"/>
          <path fill="#0D9488" d="M237,305 L275,305 L256,338 Z"/>
        </g>
      </svg>
      <p>accent: teal iris</p>
    </div>
    <div class="sizes">
      <img src="sdl-mark-v2-iris.svg" width="48"><img src="sdl-mark-v2-iris.svg" width="32">
      <img src="sdl-mark-v2.svg" width="32"><img src="sdl-mark-v2.svg" width="16">
    </div>
  </div>
  <div class="row dark">
    <div class="cell"><img src="sdl-mark-v2-dark.svg" width="130"><p>v2 dark</p></div>
    <div class="cell"><img src="sdl-mark-v2-iris-dark.svg" width="130"><p>v2 iris dark</p></div>
  </div>
</body>
</html>
