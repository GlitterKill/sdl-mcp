name: Setup tree-sitter
description: Patch tree-sitter for C++20, rebuild all grammar packages, and verify they load

runs:
  using: composite
  steps:
    - name: Rebuild native addons (tree-sitter)
      shell: bash
      run: |
        # Patch tree-sitter binding.gyp: Node 24 V8 requires C++20 but tree-sitter 0.25.0 hardcodes C++17
        sed -i.bak 's/c++17/c++20/g' node_modules/tree-sitter/binding.gyp
        npm rebuild tree-sitter tree-sitter-bash tree-sitter-c tree-sitter-c-sharp tree-sitter-cpp tree-sitter-go tree-sitter-java tree-sitter-javascript tree-sitter-kotlin tree-sitter-php tree-sitter-python tree-sitter-rust tree-sitter-typescript

    - name: Verify tree-sitter packages load
      shell: bash
      run: |
        node --input-type=module <<'EOF'
        const packages = [
          "tree-sitter",
          "tree-sitter-bash",
          "tree-sitter-c",
          "tree-sitter-c-sharp",
          "tree-sitter-cpp",
          "tree-sitter-go",
          "tree-sitter-java",
          "tree-sitter-kotlin",
          "tree-sitter-php",
          "tree-sitter-python",
          "tree-sitter-rust",
          "tree-sitter-typescript",
        ];

        for (const pkg of packages) {
          await import(pkg);
          console.log(`[ok] ${pkg}`);
        }
        EOF
